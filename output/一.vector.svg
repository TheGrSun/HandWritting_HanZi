<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="256" height="256">
  <defs>
    <!-- 动态蒙版：笔画按顺序渐进绘制 -->
    <mask id="write-mask">
      <rect width="1024" height="1024" fill="black"/>
      <g transform="translate(62, 962) scale(1, -1)">
        <path d="M 518 382 Q 572 385 623 389 Q 758 399 900 383 Q 928 379 935 390 Q 944 405 930 419 Q 896 452 845 475 Q 829 482 798 473 Q 723 460 480 434 Q 180 409 137 408 Q 130 408 124 408 Q 108 408 106 395 Q 105 380 127 363 Q 146 348 183 334 Q 195 330 216 338 Q 232 344 306 354 Q 400 373 518 382 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 2103.172430931456; --delay: 0.000s; --duration: 0.300s;"/>
      </g>
    </mask>

    <style>
      .mask-stroke {
        stroke-dasharray: var(--length);
        stroke-dashoffset: var(--length);
        animation: draw-stroke 1.25s ease-out infinite;
        animation-delay: var(--delay);
      }

      @keyframes draw-stroke {
        0% {
          stroke-dashoffset: var(--length);
        }
        24.0% {
          stroke-dashoffset: 0;
        }
        60.0% {
          stroke-dashoffset: 0;
        }
        63.0%, 100% {
          stroke-dashoffset: var(--length);
        }
      }
    </style>
  </defs>

  <!-- 白色背景 -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- TTF 字体图像，通过蒙版渐进显示 -->
  <image x="0" y="0" width="1024" height="1024"
         href="data:image/png;base64," mask="url(#write-mask)"/>

</svg>