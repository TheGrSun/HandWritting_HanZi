<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="256" height="256">
  <defs>
    <!-- 动态蒙版：笔画按顺序渐进绘制 -->
    <mask id="write-mask">
      <rect width="1024" height="1024" fill="black"/>
      <g transform="translate(62, 962) scale(1, -1)">
        <path d="M 475 485 Q 547 653 563 683 Q 573 695 565 708 Q 558 721 519 742 Q 491 757 480 754 Q 462 750 465 730 Q 484 537 292 308 Q 280 296 269 284 Q 212 217 68 102 Q 58 92 66 89 Q 76 86 90 92 Q 190 138 274 210 Q 380 294 462 456 L 475 485 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 2118.2112229953545; --delay: 0.000s; --duration: 0.300s;"/>
        <path d="M 462 456 Q 480 423 575 292 Q 666 171 733 101 Q 764 67 793 69 Q 881 75 958 79 Q 991 80 992 89 Q 993 98 956 112 Q 772 178 740 205 Q 617 304 490 466 Q 481 476 475 485 C 457 509 447 482 462 456 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 1742.4156427407902; --delay: 0.300s; --duration: 0.300s;"/>
      </g>
    </mask>

    <style>
      .mask-stroke {
        stroke-dasharray: var(--length);
        stroke-dashoffset: var(--length);
        animation: draw-stroke 2.00s ease-out infinite;
        animation-delay: var(--delay);
      }

      @keyframes draw-stroke {
        0% {
          stroke-dashoffset: var(--length);
        }
        30.0% {
          stroke-dashoffset: 0;
        }
        75.0% {
          stroke-dashoffset: 0;
        }
        78.0%, 100% {
          stroke-dashoffset: var(--length);
        }
      }
    </style>
  </defs>

  <!-- 白色背景 -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- TTF 字体图像，通过蒙版渐进显示 -->
  <image x="0" y="0" width="1024" height="1024"
         href="data:image/png;base64," mask="url(#write-mask)"/>

</svg>