<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="256" height="256">
  <defs>
    <!-- 动态蒙版：笔画按顺序渐进绘制 -->
    <mask id="write-mask">
      <rect width="1024" height="1024" fill="black"/>
      <g transform="translate(62, 962) scale(1, -1)">
        <path d="M 171 459 Q 147 381 112 311 Q 91 269 117 230 Q 129 209 152 227 Q 177 249 190 289 Q 211 344 208 392 Q 211 432 199 462 Q 192 472 185 472 Q 175 469 171 459 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 697.221874494733; --delay: 0.000s; --duration: 0.300s;"/>
        <path d="M 863 228 Q 859 243 834 262 Q 797 290 698 391 Q 691 398 685 398 Q 682 397 684 389 Q 708 338 732 281 Q 742 257 728 241 Q 689 208 550 226 Q 441 244 397 323 Q 370 377 355 435 Q 348 463 324 476 Q 306 486 299 478 Q 295 474 302 454 Q 312 429 335 363 Q 372 224 476 178 Q 495 171 521 163 Q 710 115 851 212 Q 866 221 863 228 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 2143.286625467614; --delay: 0.300s; --duration: 0.300s;"/>
        <path d="M 441 617 Q 475 578 511 531 Q 524 515 541 513 Q 553 512 561 525 Q 568 541 564 574 Q 560 619 444 670 Q 428 677 420 675 Q 414 672 414 658 Q 415 645 441 617 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 575.9077910207138; --delay: 0.600s; --duration: 0.300s;"/>
        <path d="M 760 585 Q 814 536 877 465 Q 896 441 914 437 Q 924 436 933 447 Q 948 463 932 514 Q 922 563 840 592 Q 789 613 761 621 Q 751 627 748 612 Q 747 596 760 585 Z"
             class="mask-stroke"
             stroke="white"
             stroke-width="144"
             stroke-linecap="round"
             stroke-linejoin="round"
             fill="none"
             style="--length: 690.2514293527145; --delay: 0.900s; --duration: 0.300s;"/>
      </g>
    </mask>

    <style>
      .mask-stroke {
        stroke-dasharray: var(--length);
        stroke-dashoffset: var(--length);
        animation: draw-stroke 3.50s ease-out infinite;
        animation-delay: var(--delay);
      }

      @keyframes draw-stroke {
        0% {
          stroke-dashoffset: var(--length);
        }
        34.3% {
          stroke-dashoffset: 0;
        }
        85.7% {
          stroke-dashoffset: 0;
        }
        88.7%, 100% {
          stroke-dashoffset: var(--length);
        }
      }
    </style>
  </defs>

  <!-- 白色背景 -->
  <rect width="1024" height="1024" fill="white"/>

  <!-- TTF 字体图像，通过蒙版渐进显示 -->
  <image x="0" y="0" width="1024" height="1024"
         href="data:image/png;base64," mask="url(#write-mask)"/>

</svg>